name: convene
version: 0.4.0
summary: >
  Session lifecycle as a capability of the always-on lore bot: drives
  Discord's native scheduled events, adds quorum (a session runs iff
  the DM plus N players are in), lifecycle nudges (bring the recorder;
  stage and transcribe after), recap announcement when a new
  sessions/ page reaches the projection the bot already polls, and the
  between-sessions prep ask the DM broadcasts to the players verbatim.
  0.3.0 adds the reveal digest: when any page newly enters the
  projection (a twin flipped to player-visible, a new player page
  published — not just sessions/), the bot posts one batched
  "the veil lifts" archive digest on its existing lifecycle beat, a
  mechanical relay of each page's own title and link, leak-proof
  because it reads only the projection. It also folds two durability
  fixes proven needed on the live bot: reminders are no longer marked
  fired when the announce channel is unset (they re-fire once one
  exists), and the state file is written atomically and parsed
  defensively so a crash mid-write can't wedge the bot at startup.
  0.4.0 adds session-vs-other-event handling: SESSION_MATCH identifies a
  session by name keyword (case-insensitive), so a shared calendar can
  carry movie nights and one-shots alongside sessions. Unset, every event
  is a session as before (backward-compatible); set, only name-matching
  events run the quorum lifecycle while anything else gets one neutral
  "new event on the calendar" heads-up (the new EVENT reminder) and
  nothing more — no quorum, no DM mention, no lifecycle nudges.
touches:
  - lore-bot
depends:
  - lore-bot
cost_posture:
  free: >
    Rides the lore bot's existing always-on process; zero new spend,
    no second host.
  paid: none
  heuristic: >
    Only earns its place over free Apollo for tables wanting quorum,
    lifecycle orchestration, and recap announce.
