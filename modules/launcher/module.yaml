name: launcher
version: 0.4.0
# 0.4.0: the macOS supervisor gains a Restart menu item (Cmd-R). The child
# launch is factored into a single startService() used both at launch and on
# restart; a `restarting` flag lets the child's terminationHandler branch —
# a restart-triggered exit relaunches the service in the same log window
# without quitting, while a genuine self-exit still quits the app as before.
# Quit (Cmd-Q) and the window-close/self-exit teardown are unchanged.
#
# 0.3.1: fix-only. The Info.plist now XML-escapes the app name (a name with
# & < > no longer yields a malformed plist); the Swift supervisor bash-quotes
# the campaign dir it `cd`s into and escapes newlines/CRs in every baked
# string literal (no shell injection, no broken literal); and
# bundle_identifier collapses runs of non-alphanumerics to '-' instead of
# stripping them, so near-duplicate names (Lore Bot / Lore-Bot / LoreBot)
# get distinct TCC identities instead of colliding.
summary: >
  Packages a campaign's local service (the recorder bot, or a
  locally-run lore bot) as a native double-clickable launcher: a
  hand-built, code-signed macOS .app that owns its identity and
  supervises the service, or a Windows .cmd. Each delegates to the
  campaign's run verb (uv run .eddic/eddic.py run <service>) so it never
  duplicates the run command. On macOS the app is a self-contained
  windowed AppKit app — its own live-log window, a Restart-on-Cmd-R and a
  Quit-on-Cmd-Q menu, no Terminal — that runs the service as its own
  child; Restart relaunches the child in the same window (picking up a
  code/config change or clearing a stuck bot) without quitting, while
  quitting it (Cmd-Q or closing the window) terminates the whole process
  group, no orphans.
touches:
  - recorder
  - lore-bot
depends:
  - cli
cost_posture:
  free: >
    Entirely local and free, wrapping the already-free run verb. No
    hosting, no third-party packager. The macOS .app is built and
    ad-hoc code-signed with swiftc and codesign, which ship free with
    the Xcode command-line tools; the Windows .cmd is plain text.
  paid: none
  heuristic: >
    A real Windows .exe would need a packager (pyinstaller, WinSW);
    stamp the dependency-free .cmd unless the table has a hard need for
    a signed .exe.
