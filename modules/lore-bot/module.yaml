name: lore-bot
version: 0.2.0
summary: >
  The Discord lore-keeper: answers the table's questions from the
  player projection (corpus in a prompt-cached system block),
  self-refreshing by polling its source per the freshness contract.
  Players get "what the hell is a Celeste" answered where they
  already are.
touches:
  - bot/
depends:
  - cli
  - wiki
cost_posture:
  free: >
    Run locally (any always-on machine) for nothing beyond LLM API
    usage, which prompt caching keeps small. The bot answers from an
    API key, not a subscription.
  paid: >
    A worker host (e.g. Railway, ~$5/mo) if no always-on machine
    exists; API usage scales with table chattiness.
  heuristic: >
    Local while a machine is reliably on during play sessions; a
    host when the table expects answers at 2am or the DM's laptop
    sleeps.
compatibility:
  anthropic:
    role: model provider
    status: verified
    date: 2026-07-16
    evidence: design proven by predecessor bot in production; pure core verified in CI
  openai:
    role: model provider
    status: unverified
    date: 2026-07-17
    evidence: Responses adapter request shape golden-tested in CI; no live deployment yet
