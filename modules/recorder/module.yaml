name: recorder
version: 0.5.0
# 0.5.0: the recorder's slash commands moved from a single `/record`
# subcommand group to individual top-level commands — `/record-start`,
# `/record-stop`, `/record-consent-role`, `/record-empty-timeout`, and
# `/record-help`. Discord attaches command permissions only to top-level
# commands, so splitting the group makes each command individually
# permissionable in Server Settings → Integrations → Command Permissions.
# The four control/config commands keep the Manage-Server default;
# record-help is open. Behaviour is otherwise unchanged. Discord re-syncs
# the command set on the bot's next start.
summary: >
  The campaign's own session-recording Discord bot: react-gated
  per-microphone consent enforced in the audio sink, per-speaker
  tracks staged straight into the transcriber's layout on the DM's
  machine, and DAVE (E2EE) voice receive made to work via davey plus
  import-time patches to py-cord 2.8.0 — live-proven end to end. The
  consent post is always a public channel message (never the ephemeral
  slash reply), and start/stop/status are also reachable through a
  loopback-only control surface that the streamdeck module drives.
touches:
  - capture
  - transcriber
depends:
  - cli
cost_posture:
  free: >
    Entirely free: runs locally at session time on the DM's machine,
    recordings land on the disk the transcriber reads. No hosting.
  paid: >
    A cloud host plus object storage is a possible future mode for
    tables that want it; deliberately not built (see the pattern).
  heuristic: >
    The recording's destination is the DM's disk because that is
    where transcription lives; pay for cloud only if that stops
    being true for your table.
