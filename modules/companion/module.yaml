name: companion
version: 0.2.0
summary: >
  At-the-table companions under the knowledge-parity conduct doctrine
  (possible and true, never better): player and DM companions on their
  retrieval tiers, and the backstory interviewer with its
  scribe/drafter authorship dial and collaborator facet (generative
  asks answered as archive-first record, then labeled ideas-not-canon).
  Conduct doctrine verified for Claude by a 10-vector adversarial
  red-team (2026-07-19, all HELD); the interviewer's backstory
  extrapolation hardened to offer two–three divergent seeds rather
  than a single "most plausible" one, keeping the identity the
  player's to choose. Also ships the player kit: a single-source,
  one-page handoff (companion persona plus that player's player-tier
  connector URL) the DM shares as one capability URL — the retrieval
  worker serves it as a self-documenting page at /<token>/companion,
  rendered from the same player-kit.md and with the MCP URL filled per
  request from the authenticated token, so no token is ever baked in.
  Onboards a player as an audience with no repo, safe to distribute by
  projection and verified conduct.
touches:
  - retrieval
depends:
  - retrieval
cost_posture:
  free: >
    Instruction templates pasted into the chat products the table
    already uses; retrieval rides the existing worker. No new
    services, no new spend.
  paid: none
  heuristic: n/a
compatibility:
  claude:
    role: answer client
    status: verified
    date: 2026-07-19
    evidence: 10-vector adversarial red-team, all HELD post-recheck; recorded run in verify/conduct-acceptance.md; ledger docs/compatibility.md
  chatgpt:
    role: answer client
    status: unverified
    date: 2026-07-19
    evidence: conduct doctrine and collaborator facet untested live; rig is verify/conduct-acceptance.md
