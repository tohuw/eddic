<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{TITLE}} — {{SITE_NAME}}</title>
<style>
  :root {
    --ink: #24211c; --paper: #f6f1e7; --accent: #7a5c2e;
    --faint: #8a8375; --rule: #d9d0bf;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e8e2d4; --paper: #17150f; --accent: #cfa85e;
      --faint: #97907f; --rule: #3a3527;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font: 1.0625rem/1.65 Georgia, 'Times New Roman', serif;
  }
  header {
    border-bottom: 1px solid var(--rule);
    padding: 0.9rem 1.25rem; font-variant: small-caps;
    letter-spacing: 0.06em;
  }
  header a { color: var(--faint); text-decoration: none; }
  header a:hover { color: var(--accent); }
  main { max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
  h1, h2, h3 { line-height: 1.25; font-weight: 600; }
  h1 { font-size: 1.9rem; margin: 1.2rem 0 0.8rem; }
  h2 { font-size: 1.3rem; margin-top: 2rem; }
  a { color: var(--accent); }
  blockquote {
    margin: 1.2rem 0; padding-left: 1rem;
    border-left: 3px solid var(--rule); color: var(--faint);
    font-style: italic;
  }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid var(--rule); padding: 0.4rem 0.6rem;
           text-align: left; }
  img { max-width: 100%; }
  code { font-family: ui-monospace, monospace; font-size: 0.9em; }
  hr { border: 0; border-top: 1px solid var(--rule); margin: 2rem 0; }
</style>
</head>
<body>
<header><a href="/">{{SITE_NAME}}</a></header>
<main>
{{BODY}}
</main>
</body>
</html>
