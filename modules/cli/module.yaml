name: cli
version: 0.2.0
summary: >
  Stamps the vendored eddic CLI into a campaign: the dispatcher
  (.eddic/eddic.py), campaign config, the applied-patterns manifest,
  and the lib/ directory other modules vendor their verbs into. The
  contractual locus for all deterministic campaign workflows.
touches:
  - .eddic/
depends: []
cost_posture:
  free: >
    Entirely local and free. Runtime is uv-run Python (uv bootstraps
    Python itself; single-binary install on Windows and macOS).
  paid: none
  heuristic: n/a
