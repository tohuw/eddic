# eddic retrieval worker — deploy with `wrangler deploy` from this dir.
# Tokens are secrets, never in this file:
#   wrangler secret put TOKEN_DM
#   wrangler secret put TOKEN_PLAYER
name = "{{WORKER_NAME}}"
main = "worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Unified host: the static site (player projection -> HTML, built by
# `eddic build`) is served for any path that isn't a valid MCP/REST
# request. Humans get the wiki at /, agents get MCP at /<token>/mcp on
# the same host. Point `directory` at the render module's site_dir
# (default dist/site), relative to this worker/ dir.
[assets]
directory = "../dist/site"
binding = "ASSETS"

# Witness write path (optional). Bind a KV namespace as INBOX to enable
# the suggestion review inbox — suggest_edit / suggest_page (any tier)
# and list_suggestions / resolve_suggestion (DM tier). Provision it with
#   wrangler kv namespace create INBOX
# then paste the printed id below and uncomment the block. Omit it to
# stay read-only: with no INBOX binding the worker advertises and
# accepts only the four read tools.
# [[kv_namespaces]]
# binding = "INBOX"
# id = "{{INBOX_KV_ID}}"
