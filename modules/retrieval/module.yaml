name: retrieval
version: 0.1.0
summary: >
  The campaign's agentic retrieval surface: a Cloudflare Worker MCP
  server with two bearer tokens — the DM token sees the master wiki,
  the player token sees the projection. Corpora are bundled into the
  deployed script (never at a fetchable URL). Ask your campaign
  questions from any MCP-capable agent, including a phone.
touches:
  - worker/
  - .eddic/lib/stage.py
depends:
  - cli
  - wiki
cost_posture:
  free: >
    Cloudflare Workers free tier (100k requests/day) is orders of
    magnitude beyond a table's question volume. wrangler is free.
  paid: none
  heuristic: >
    Free tier until a wiki's corpus nears the 1 MB bundle limit
    (stage warns); the growth path is a KV-backed corpus, still
    within free tier for any plausible campaign.
