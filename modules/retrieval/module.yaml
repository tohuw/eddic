name: retrieval
version: 0.6.0
summary: >
  The campaign's agentic retrieval surface: a Cloudflare Worker MCP
  server with two bearer tokens — the DM token sees the master wiki,
  the player token sees the projection. Corpora are bundled into the
  deployed script (never at a fetchable URL). Ask your campaign
  questions from any MCP-capable agent, including a phone. Unified
  host: the same Worker serves the player site (render's built mirror)
  at / for humans, MCP at /<token>/mcp for agents, and the player
  companion page at /<token>/companion (self-documenting handoff,
  single-sourced from the companion module's kit, with the MCP URL
  filled per request from the authenticated token). An optional
  witness write path (when an INBOX KV namespace is bound) lets any
  tier file suggestions into a review inbox — never canon, never a
  player-visible surface — for the owner to promote out of band via
  the `suggestions` verb; the two review tools are DM-tier only.
touches:
  - worker/
  - .eddic/lib/stage.py
  - .eddic/lib/suggestions.py
depends:
  - cli
  - wiki
  - render
cost_posture:
  free: >
    Cloudflare Workers free tier (100k requests/day) is orders of
    magnitude beyond a table's question volume. wrangler is free.
  paid: none
  heuristic: >
    Free tier until a wiki's corpus nears the 1 MB bundle limit
    (stage warns); the growth path is a KV-backed corpus, still
    within free tier for any plausible campaign.
compatibility:
  claude:
    role: answer client
    status: verified
    date: 2026-07-16
    evidence: owner live tests (cold-context chat, phone dictation, tier isolation); docs/compatibility.md ledger
  chatgpt:
    role: answer client
    status: documented
    date: 2026-07
    evidence: help.openai.com 12584461 (web-only custom MCP, plan-gated); connect flow drafted UNVERIFIED in PATTERN.md
