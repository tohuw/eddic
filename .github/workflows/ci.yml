name: ci

# Manual-only: the deterministic floor runs locally on pre-push
# (.githooks/pre-push) so no metered Actions minutes are spent on every
# push/PR. Trigger this by hand when you want the full cross-OS
# (Linux + macOS + Windows) matrix — e.g. before a release or after
# touching anything portability-sensitive.
on:
  workflow_dispatch:

jobs:
  floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Contract floor
        run: python3 tools/floor.py

  verify:
    needs: floor
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Module verifies
        run: uv run tools/verify_all.py
      - name: End-to-end composition
        run: uv run tools/verify_e2e.py
