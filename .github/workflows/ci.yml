name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Contract floor
        run: python3 tools/floor.py

  verify:
    needs: floor
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Module verifies
        run: uv run tools/verify_all.py
